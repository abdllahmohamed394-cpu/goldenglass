<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>جولدن جلاس - GOLDEN GLASS</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        :root { --golden: #D4AF37; --dark: #1a1a1a; }
        body { font-family: sans-serif; background: #e9ecef; margin: 0; padding: 10px; }
        .app-container { max-width: 480px; margin: auto; background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: 2px solid var(--golden); }
        .header { background: var(--dark); color: var(--golden); padding: 25px; text-align: center; border-bottom: 5px solid var(--golden); }
        .form-body { padding: 20px; }
        .input-box { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 15px; background: var(--dark); color: var(--golden); border: 2px solid var(--golden); border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .result-card { margin-top: 20px; padding: 15px; background: #fffcf0; border: 2px solid var(--golden); border-radius: 10px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: var(--dark); color: var(--golden); }
        .btn-whatsapp { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><h1>GOLDEN GLASS</h1><p>تخصيمات زجاج السكوريت</p></div>
    <div class="form-body">
        <div class="input-box"><label>⚙️ نظام الشغل:</label><select id="mode">
            <option value="sp">جرار إسباني (خصم 5.5سم)</option>
            <option value="it">مفصلي إيطالي</option>
        </select></div>
        <div class="input-box"><label>↔️ العرض (سم):</label><input type="number" id="W" step="0.1"></div>
        <div class="input-box"><label>↕️ الارتفاع (سم):</label><input type="number" id="H" step="0.1"></div>
        <button class="btn-calc" onclick="calculate()">احسب الآن 📝</button>
        <div id="results" class="result-card">
            <table><thead><tr><th>القطعة</th><th>العرض</th><th>الطول</th></tr></thead><tbody id="tableData"></tbody></table>
            <p style="text-align:center">إجمالي: <span id="finalArea" style="color:red; font-weight:bold"></span> م²</p>
            <button class="btn-whatsapp" onclick="sendToWhatsApp()">إرسال واتساب 📱</button>
        </div>
    </div>
</div>
<script>
    function calculate() {
        let mode = document.getElementById('mode').value;
        let w = parseFloat(document.getElementById('W').value);
        let h = parseFloat(document.getElementById('H').value);
        if(!w || !h) return alert("أدخل المقاسات");
        let html = "";
        if(mode === 'sp') {
            html += `<tr><td>ضلفة</td><td>${(w/2+5).toFixed(1)}</td><td>${(h-5.5).toFixed(1)}</td></tr>`;
            html += `<tr><td>ثابت</td><td>${(w/2).toFixed(1)}</td><td>${h.toFixed(1)}</td></tr>`;
        } else {
            html += `<tr><td>ضلفة</td><td>${(w-0.5).toFixed(1)}</td><td>${(h-1).toFixed(1)}</td></tr>`;
        }
        document.getElementById('tableData').innerHTML = html;
        document.getElementById('finalArea').innerText = ((w*h)/10000).toFixed(2);
        document.getElementById('results').style.display = 'block';
    }
    function sendToWhatsApp() {
        let a = document.getElementById('finalArea').innerText;
        window.open(`https://wa.me/?text=مقاسات جولدن جلاس: ${a} متر مربع`);
    }
</script>
</body>
</html>
